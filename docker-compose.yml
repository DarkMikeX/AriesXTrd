version: '3.8'

services:
  trading-bot:
    build: .
    container_name: telegram-trading-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_ID=${TELEGRAM_ADMIN_ID}
      - DATABASE_PATH=/app/database/trading.db
      - IQ_OPTION_EMAIL=${IQ_OPTION_EMAIL}
      - IQ_OPTION_PASSWORD=${IQ_OPTION_PASSWORD}
      - TRADINGVIEW_API_KEY=${TRADINGVIEW_API_KEY}
      - LOG_LEVEL=info
      - TIMEZONE=${TIMEZONE:-America/New_York}
    volumes:
      - ./database:/app/database
      - ./logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - trading-network
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "node", "-e", "require('./src/app.js').getHealth ? console.log('healthy') : process.exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  database:
    image: alpine:latest
    container_name: trading-bot-db-volume
    volumes:
      - ./database:/database
    command: sh -c "mkdir -p /database && chmod 755 /database"
    networks:
      - trading-network

  prometheus:
    image: prom/prometheus:latest
    container_name: trading-bot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - trading-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: trading-bot-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - trading-network
    profiles:
      - monitoring

  redis:
    image: redis:7-alpine
    container_name: trading-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - trading-network
    profiles:
      - cache

  nginx:
    image: nginx:alpine
    container_name: trading-bot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - trading-network
    profiles:
      - web
    depends_on:
      - trading-bot

volumes:
  grafana_data:
  redis_data:

networks:
  trading-network:
    driver: bridge